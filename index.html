<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استودیو عاشورا | سامانه مداحی اهل بیت</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>🌙 استودیو عاشورا</h1>
                <p>سامانه اشعار و مداحی اهل بیت (ع)</p>
            </div>
            <!-- دکمه مدیریت حذف شد -->
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="جستجوی مداحی، نام مداح یا متن..." class="search-input">
            <button id="searchBtn" class="btn-gold">جستجو</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">همه</button>
            <button class="filter-btn" data-filter="مولودی">🕌 مولودی</button>
            <button class="filter-btn" data-filter="مرثیه">😢 مرثیه</button>
            <button class="filter-btn" data-filter="منقبت">🌟 منقبت</button>
            <button class="filter-btn" data-filter="سوگواری">💔 سوگواری</button>
        </div>

        <main>
            <h2>🎵 آخرین مداحی‌ها</h2>
            <div id="madahiList" class="madahi-grid"></div>
        </main>

        <footer>
            <p>اللهم عجل لولیك الفرج - استودیو عاشورا | تمامی حقوق مادی و معنوی محفوظ است</p>
        </footer>
    </div>

    <div id="customPlayer" class="now-playing"></div>

    <script src="index.js"></script>
</body>
</html>
