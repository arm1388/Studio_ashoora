<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت | استودیو عاشورا</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        /* استایل صفحه لاگین */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-box {
            background: #1a2a1a;
            padding: 40px;
            border-radius: 20px;
            border-right: 4px solid #d4af37;
            text-align: center;
            width: 300px;
        }
        .login-box h2 {
            color: #d4af37;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #0a0f0a;
            border: 2px solid #2a4a2a;
            border-radius: 10px;
            color: #e6d5a8;
            text-align: center;
            font-size: 1.2em;
        }
        .login-box button {
            background: #d4af37;
            color: #0a0f0a;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .error-msg {
            color: #ff6666;
            margin-top: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 پنل مدیریت</h2>
        <input type="password" id="passwordInput" placeholder="رمز عبور" autocomplete="off">
        <button id="loginBtn">ورود</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="adminContent" style="display: none;">
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔧 پنل مدیریت | استودیو عاشورا</h1>
            <a href="index.html" class="btn-back">← بازگشت به سایت</a>
        </div>
        
        <div class="form-section">
            <h2 id="formTitle">➕ افزودن مداحی جدید</h2>
            <form id="madahiForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label>نام مداحی:</label>
                    <input type="text" id="name" required placeholder="مثال: اشک سرد">
                </div>
                
                <div class="form-group">
                    <label>نام مداح:</label>
                    <input type="text" id="madah" required placeholder="مثال: حاج محمود کریمی">
                </div>
                
                <div class="form-group">
                    <label>لینک فایل صوتی (mp3):</label>
                    <input type="url" id="link" required placeholder="https://...">
                </div>
                
                <div class="form-group">
                    <label>دسته‌بندی:</label>
                    <select id="category">
                        <option value="مولودی">🕌 مولودی</option>
                        <option value="مرثیه">😢 مرثیه</option>
                        <option value="منقبت">🌟 منقبت</option>
                        <option value="سوگواری">💔 سوگواری</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">✅ افزودن مداحی</button>
                <button type="button" class="btn-cancel" id="cancelBtn" style="display:none;">❌ انصراف از ویرایش</button>
            </form>
        </div>
        
        <div class="list-section">
            <h2>📋 لیست مداحی‌ها</h2>
            <div id="adminList" class="admin-list"></div>
        </div>
    </div>
</div>

<script src="admin.js"></script>
<script>
    // کنترل رمز عبور (1234)
    const loginOverlay = document.getElementById('loginOverlay');
    const adminContent = document.getElementById('adminContent');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    function checkPassword() {
        const enteredPassword = passwordInput.value;
        if (enteredPassword === '1234') {
            loginOverlay.style.display = 'none';
            adminContent.style.display = 'block';
            // بارگذاری دیتا بعد از ورود موفق
            if (typeof loadAdminData === 'function') {
                loadAdminData();
            }
        } else {
            loginError.innerText = 'رمز اشتباه است! لطفاً دوباره تلاش کنید.';
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    loginBtn.addEventListener('click', checkPassword);
    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });
</script>
</body>
</html>
